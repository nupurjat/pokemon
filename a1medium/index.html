<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
     <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
  
</head>
<body>
    <main>
       <nav>
           <div class="bar"><i  class="ri-align-justify"></i></div>
           <div class="logo"> <img width="240px" src="https://pluspng.com/img-png/pokemon-logo-png-pokemon-logo-text-png-1428-1390.png" alt="logoo"></div>
           <div class="sun"><i class="ri-sun-line"></i> </div>
       </nav>
       <header>
        <div class  ="search">
           <button > <i class="ri-search-line"></i> Search for a Pokemon</button>
         
        </div>
        <div class="btn">
           <button>Filter by type(1) <i class="ri-arrow-down-s-line"></i></button>
             <button><img width="15px" src="./Sort Descending.png" alt="sortt"></button>
        </div>
       </header>
       <section>
            <div class="cards" id="green">
                <div class="top">
                    <p>#0908</p>
                    <i class="ri-poker-hearts-line"></i>
                </div>
                <div class="photo" >
                    <img src="./static-assets-upload9562272973336929284-removebg-preview.png" alt="">
                </div>
                <div class="name">
                    <h5>Meoscarada</h5>
                </div>
                <div class="theme">
                                    <span class="grass">
                        <i class="ri-leaf-fill"></i>
                        GRASS
                    </span>
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
            <div class="cards" id="blue">
            <div class="top">
                <p>#0624</p>
                 <i class="ri-poker-hearts-line"></i>
            </div>
            <div class="photo">
                <img src="https://db.pokemongohub.net/_next/image?url=%2Fimages%2Fpokemon-home-renders%2FShiny%2Fpoke_capture_0624_000_mf_n_00000000_f_r.png&w=384&q=75" alt="">
            </div>
            <div class="name">
                <h5>Pawniard</h5>
            </div>
            <div class="theme">
                <span class="dark">
                  <i class="ri-moon-fill"></i>
                    DARK/STEEL
                </span>
                <i class="ri-arrow-right-long-line"></i>
            </div>
        </div>
        <div class="cards" id="red">
            <div class="top">
                <p>#0229</p>
                <i class="ri-poker-hearts-line"></i>
            </div>
            <div class="photo">
                <img src="./zlzkgtzl0t181-removebg-preview.png" alt="">
            </div>
            <div class="name">
                <h5>Houndoom</h5>
            </div>
            <div class="theme">
                <span class="fire">
                  <i class="ri-fire-fill"></i>
                    DARK/FIRE
                </span>

                <i class="ri-arrow-right-long-line"></i>
            </div>
        </div>
        <div class="cards" id="purple">
            <div class="top">
                <p>#0686</p>
                <i class="ri-poker-hearts-line"></i>
            </div>
            <div class="photo">
                <img src="./55eb1dee363d8819b3dc0673a48145c6-removebg-preview.png" alt="">
            </div>
            <div class="name">
                <h5>Inkay</h5>
            </div>
            <div class="theme">
                <span class="water">
                  <i class="ri-contrast-drop-2-line"></i>
                    DARK/PSYCHIC
                </span>
                <i class="ri-arrow-right-long-line"></i>
            </div>
        </div>
       </section>
       <footer>
          <div class="container">
            <div class="logo" style="color: rgb(115, 115, 220); ">
             <i class="ri-focus-2-line"></i>
            </div>
            <div class="texts">
                <h5>Explore</h5>
                <p>Discover all your<br> favourite pokemon</p>
            </div>
          </div>
           <div class="container">
            <div class="logo" style="color: greenyellow;">
                 <i class="ri-leaf-fill"></i>
            </div>
            <div class="texts">
                <h5>Filter</h5>
                <p>Find pokemon by <br> types and abilites</p>
            </div>
          </div>
           <div class="container">
            <div class="logo" style="color: rgb(164, 164, 66);">
              <i class="ri-star-fill"></i>
            </div>
            <div class="texts">
                <h5>Collection</h5>
                <p>Save and manage <br> all your collection</p>
            </div>
          </div>
           <div class="container">
            <div class="logo" style="color: rgb(190, 112, 227);">
                <i class="ri-shield-check-fill"></i>
            </div>
            <div class="texts">
                <h5>Stats</h5>
                <p>View stats and learn <br>about pokemon</p>
            </div>
          </div>

       </footer>
    </main>
</body>
</html>
